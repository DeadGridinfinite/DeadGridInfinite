  html, body {

  }
  #gameCanvas {
    display:block;
    background: radial-gradient(ellipse at center, #14181f 0%, #05060a 70%);
    touch-action:none;
  }
  #hud {
    position:fixed; top:0; left:0; width:100%;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 20px;
    pointer-events:none;
    z-index:10;
  }
  .hud-box {
    background:rgba(10,12,16,0.6);
    border:1px solid rgba(110,255,150,0.35);
    border-radius:8px;
    padding:8px 16px;
    color:#9dffa8;
    font-size:18px;
    text-shadow:0 0 8px rgba(110,255,150,0.8);
    box-shadow:0 0 12px rgba(110,255,150,0.15);
    letter-spacing:1px;
    position:relative;
  }
  .hud-box::before, .hud-box::after {
    content:'';
    position:absolute;
    width:9px; height:9px;
    border:1.5px solid currentColor;
    opacity:0.9;
  }
  .hud-box::before { top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .hud-box::after { bottom:-1px; right:-1px; border-left:none; border-top:none; }
  #lives { color:#ff6b6b; text-shadow:0 0 8px rgba(255,80,80,0.8); }
  #highscore { color:#7fd3ff; text-shadow:0 0 8px rgba(80,180,255,0.8); }

  .overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.82);
    backdrop-filter: blur(2px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20;
    text-align:center;
    padding:20px;
  }
  .overlay h1 {
    color:#ff3b3b;
    font-size:52px;
    letter-spacing:7px;
    text-shadow:0 0 20px rgba(255,40,40,0.9), 0 0 40px rgba(255,40,40,0.5);
    margin-bottom:10px;
    animation:flicker 1.6s infinite;
    line-height:1.15;
  }
  .overlay h1 .subtitle-line {
    display:block;
    font-size:0.42em;
    letter-spacing:6px;
    color:#7fd6ff;
    text-shadow:0 0 14px rgba(90,190,255,0.9), 0 0 28px rgba(90,190,255,0.5);
    margin-top:6px;
  }
  @keyframes logoPulse {
    0%,100% { filter: drop-shadow(0 0 14px rgba(90,190,255,0.75)); transform:scale(1); }
    50% { filter: drop-shadow(0 0 26px rgba(90,190,255,1)); transform:scale(1.035); }
  }
  #gameLogo { animation: logoPulse 3s ease-in-out infinite; }
    0%,100% { opacity:1; }
    45% { opacity:0.85; }
    50% { opacity:0.6; }

    font-size:13px;
    letter-spacing:3px;
    margin-bottom:24px;
    text-transform:uppercase;
  }
  .overlay p { color:#cfd8e3; font-size:18px; margin:6px 0; }
  .overlay .score-line { color:#9dffa8; font-size:20px; margin:8px 0; }
  .btn-action {
    margin-top:20px;
    padding:14px 36px;
    font-size:18px;
    font-family:'Courier New', monospace;
    letter-spacing:2px;
    background:linear-gradient(145deg, #1b2a1f, #0c1410);
    color:#9dffa8;

  #startOverlay .btn-action { border-color:#2196f3; color:#7fd3ff; box-shadow:0 0 18px rgba(80,180,255,0.4); }
  #startOverlay .btn-action:hover { box-shadow:0 0 30px rgba(80,180,255,0.7); }

  .hidden { display:none !important; }

    <div class="subtitle">Human vs Zombie Survival</div>

    <h1>GAME OVER</h1>
    <p class="score-line" id="finalScore">Score: 0</p>
    <p class="score-line" id="finalHigh">Best: 0</p>
    <button class="btn-action" onclick="startGame()">RESTART</button>
</div>

<div id="mobileControls">
  <div id="joystickZone">
    <div id="joystickKnob"></div>
  </div>
  <button id="shootBtn">FIRE</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  let viewW = window.innerWidth, viewH = window.innerHeight, dpr = 1;
  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    canvas.width = Math.round(viewW * dpr);
    canvas.height = Math.round(viewH * dpr);
    canvas.style.width = viewW + 'px';
    canvas.style.height = viewH + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- Persistent high score ----------
  let highScore = 0;
  try {
    const stored = window.localStorage && window.localStorage.getItem('deadgrid_highscore');
    if (stored) highScore = parseInt(stored, 10) || 0;
  } catch(e) { /* localStorage unavailable, fall back to in-memory only */ }

  function saveHighScore(){
    try {
      if (window.localStorage) window.localStorage.setItem('deadgrid_highscore', String(highScore));
    } catch(e) { /* ignore */ }
  }

  // ---------- Game state ----------
  let player, bullets, zombies, particles, keys = {}, score = 0, lives = 3, gameRunning = false, spawnTimer, spawnInterval, difficultyTimer, hitFlash;
  let ambientMotes = [];
  let bloodDecalCount = 0;

  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const highscoreEl = document.getElementById('highscore');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const finalHighEl = document.getElementById('finalHigh');

  function initState(){
    player = {
      x: viewW/2, y: viewH/2,
      size: 26, speed: 4.2, color:'#3aa0ff',
      angle: -Math.PI/2, moving:false, walkCycle:0
    };
    bullets = [];
    zombies = [];
    particles = [];
    keys = {};
    score = 0;
    lives = 3;
    gameRunning = true;
    spawnTimer = 0;
    spawnInterval = 90;
    difficultyTimer = 0;
    hitFlash = 0;
    bloodDecalCount = 0;
    ambientMotes = [];
    const moteCount = Math.max(24, Math.floor((viewW*viewH)/32000));
    for (let i=0;i<moteCount;i++){
      ambientMotes.push({
        x: Math.random()*viewW,
        y: Math.random()*viewH,
        vy: -(Math.random()*0.25+0.08),
        vx: (Math.random()-0.5)*0.15,
        size: Math.random()*1.8+0.6,
        alpha: Math.random()*0.35+0.12,
        phase: Math.random()*Math.PI*2
      });
    }
    updateHUD();
  }

  function updateHUD(){
    scoreEl.textContent = 'SCORE: ' + score;
    highscoreEl.textContent = 'BEST: ' + highScore;
    livesEl.textContent = 'LIVES: ' + '❤'.repeat(Math.max(lives,0)) + '♡'.repeat(Math.max(3-lives,0));
  }

  // ---------- Input ----------
  window.addEventListener('keydown', (e)=>{
    keys[e.key.toLowerCase()] = true;
    if (e.code === 'Space'){
      e.preventDefault();
      shoot();
    }
  });
  window.addEventListener('keyup', (e)=>{
    keys[e.key.toLowerCase()] = false;
  });
  // reset semua tombol saat tab/window kehilangan fokus, supaya keyup yang
  // "terlewat" (mis. alt-tab) tidak membuat pemain terus bergerak sendiri
  window.addEventListener('blur', ()=>{ keys = {}; });

  // mobile joystick
  let joyActive = false, joyDX = 0, joyDY = 0;
  const joystickZone = document.getElementById('joystickZone');
  const joystickKnob = document.getElementById('joystickKnob');

  function joyStart(e){ joyActive = true; handleJoy(e); }
  function joyMove(e){ if(joyActive) handleJoy(e); }
  function joyEnd(){
    joyActive = false; joyDX = 0; joyDY = 0;
    joystickKnob.style.top = '37px'; joystickKnob.style.left = '37px';
  }
  function handleJoy(e){
    const touch = e.touches ? e.touches[0] : e;
    const rect = joystickZone.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const dist = Math.min(Math.hypot(dx,dy), 45);
    const angle = Math.atan2(dy,dx);
    const kx = Math.cos(angle)*dist;
    const ky = Math.sin(angle)*dist;
    joystickKnob.style.left = (37+kx) + 'px';
    joystickKnob.style.top = (37+ky) + 'px';
    joyDX = Math.cos(angle) * (dist/45);
    joyDY = Math.sin(angle) * (dist/45);
    e.preventDefault();
  }
  joystickZone.addEventListener('touchstart', joyStart, {passive:false});
  joystickZone.addEventListener('touchmove', joyMove, {passive:false});
  joystickZone.addEventListener('touchend', joyEnd);
  joystickZone.addEventListener('touchcancel', joyEnd);
  joystickZone.addEventListener('mousedown', joyStart);
  window.addEventListener('mousemove', joyMove);
  window.addEventListener('mouseup', joyEnd);

  let lastShotTime = 0;
  const shootCooldown = 140; // ms, prevents super-fast click spamming

  const shootBtn = document.getElementById('shootBtn');
  shootBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); shoot(); }, {passive:false});
  shootBtn.addEventListener('click', ()=> shoot());

  // ---------- Game logic ----------
  function getNearestZombie(){
    let target = null, minDist = Infinity;
    for (const z of zombies){
      const d = Math.hypot(z.x-player.x, z.y-player.y);
      if (d < minDist){ minDist = d; target = z; }
    }
    return target;
  }

  function shoot(){
    if (!gameRunning) return;
    const now = performance.now();
    if (now - lastShotTime < shootCooldown) return;
    lastShotTime = now;
    // shoot toward nearest zombie, or current facing angle if none
    const target = getNearestZombie();
    let dx = Math.cos(player.angle), dy = Math.sin(player.angle);
    if (target){
      const len = Math.hypot(target.x-player.x, target.y-player.y) || 1;
      dx = (target.x-player.x)/len;
      dy = (target.y-player.y)/len;
      player.angle = Math.atan2(dy,dx);
    }
    const muzzleDist = player.size*0.95;
    const mx = player.x + dx*muzzleDist;
    const my = player.y + dy*muzzleDist;

    bullets.push({
      x: mx, y: my,
      dx: dx*10, dy: dy*10,
      size:4
    });

    spawnMuzzleFlash(mx, my, player.angle);
    spawnShellCasing(player.x, player.y, player.angle);
  }

  function spawnMuzzleFlash(x,y,angle){
    particles.push({
      kind:'muzzle', x, y, angle,
      dx:0, dy:0, life:6, maxLife:6, size:14
    });
    for (let i=0;i<3;i++){
      const spread = angle + (Math.random()-0.5)*0.6;
      particles.push({
        kind:'spark',
        x, y,
        dx: Math.cos(spread)*(Math.random()*3+2),
        dy: Math.sin(spread)*(Math.random()*3+2),
        life: 10+Math.random()*6, maxLife:16,
        size: Math.random()*1.5+1,
        color:'#ffdd55'
      });
    }
  }

  function spawnShellCasing(x,y,angle){
    const ejectAngle = angle + Math.PI/2 + (Math.random()-0.5)*0.3;
    particles.push({
      kind:'shell',
      x: x + Math.cos(angle)*8,
      y: y + Math.sin(angle)*8,
      dx: Math.cos(ejectAngle)*2.2 + Math.cos(angle)*1.5,
      dy: Math.sin(ejectAngle)*2.2 + Math.sin(angle)*1.5,
      rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.6,
      life: 40, maxLife:40,
      size:3,
      grounded:false
    });
  }

  function spawnBlood(x,y,angle){
    for (let i=0;i<10;i++){
      const spread = angle + (Math.random()-0.5)*2.4;
      const speed = Math.random()*4+1.5;
      particles.push({
        kind:'blood',
        x, y,
        dx: Math.cos(spread)*speed,
        dy: Math.sin(spread)*speed,
        life: 25+Math.random()*15, maxLife:40,
        size: Math.random()*2.5+1.5,
        color: Math.random()>0.5 ? '#a3122a' : '#6e0d1c'
      });
    }
  }

  function addBloodDecal(x,y){
    if (!floorDebris) return;
    floorDebris.items.push({
      x, y,
      r: Math.random()*14+10,
      type:'blood',
      rot: Math.random()*Math.PI*2,
      a: Math.random()*0.25+0.35
    });
    bloodDecalCount++;
    if (bloodDecalCount > 90){
      const idx = floorDebris.items.findIndex(d => d.type === 'blood');
      if (idx !== -1){ floorDebris.items.splice(idx,1); bloodDecalCount--; }
    }
  }

  function spawnZombieDeath(x,y){
    addBloodDecal(x,y);
    // gibs (chunky rotten flesh chunks)
    for (let i=0;i<10;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = Math.random()*3.5+1;
      particles.push({
        kind:'gib',
        x, y,
        dx: Math.cos(angle)*speed,
        dy: Math.sin(angle)*speed,
        rot: Math.random()*Math.PI*2,
        rotSpeed: (Math.random()-0.5)*0.4,
        life: 45+Math.random()*15, maxLife:60,
        size: Math.random()*4+3,
        color: Math.random()>0.4 ? '#2e7d3a' : '#1f4d27'
      });
    }
    // radioactive glow burst
    for (let i=0;i<16;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = Math.random()*5+1.5;
      particles.push({
        kind:'spark',
        x, y,
        dx: Math.cos(angle)*speed,
        dy: Math.sin(angle)*speed,
        life: 25+Math.random()*20, maxLife:45,
        size: Math.random()*3+1.5,
        color:'#7dffa0'
      });
    }
  }

  function spawnZombie(){
    const side = Math.floor(Math.random()*4);
    let x,y;
    if (side===0){ x = Math.random()*viewW; y = -30; }
    else if (side===1){ x = viewW+30; y = Math.random()*viewH; }
    else if (side===2){ x = Math.random()*viewW; y = viewH+30; }
    else { x = -30; y = Math.random()*viewH; }
    const speed = 1.0 + Math.random()*0.8 + Math.min(score/200, 1.5);
    zombies.push({
      x, y, size:24, speed, color:'#3ecf5a',
      wobble: Math.random()*Math.PI*2,
      bodySeed: Math.random()*10,
      limbPhase: Math.random()*Math.PI*2,
      angle: 0
    });
  }

  function spawnExplosion(x,y,color){
    for (let i=0;i<14;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = Math.random()*4+1;
      particles.push({
        kind:'explosion',
        x, y,
        dx: Math.cos(angle)*speed,
        dy: Math.sin(angle)*speed,
        life: 30+Math.random()*20,
        maxLife: 50,
        size: Math.random()*4+2,
        color
      });
    }
  }

  function update(){
    if (!gameRunning) return;

    // player movement
    let mx=0, my=0;
    if (keys['w']||keys['arrowup']) my -= 1;
    if (keys['s']||keys['arrowdown']) my += 1;
    if (keys['a']||keys['arrowleft']) mx -= 1;
    if (keys['d']||keys['arrowright']) mx += 1;
    if (joyActive){ mx += joyDX; my += joyDY; }
    const mlen = Math.hypot(mx,my);
    if (mlen > 0){
      mx/=mlen; my/=mlen;
      player.x += mx*player.speed;
      player.y += my*player.speed;
      player.moving = true;
      player.walkCycle += 0.22;
    } else {
      player.moving = false;
    }
    player.x = Math.max(player.size, Math.min(viewW-player.size, player.x));
    player.y = Math.max(player.size, Math.min(viewH-player.size, player.y));

    // player always faces the nearest zombie; if none, face movement direction
    const nearest = getNearestZombie();
    if (nearest){
      player.angle = Math.atan2(nearest.y-player.y, nearest.x-player.x);
    } else if (mlen > 0){
      player.angle = Math.atan2(my, mx);
    }

    // bullets
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.x += b.dx; b.y += b.dy;
      if (b.x<-20||b.x>viewW+20||b.y<-20||b.y>viewH+20){
        bullets.splice(i,1);
      }
    }

    // zombies
    for (let i=zombies.length-1;i>=0;i--){
      const z = zombies[i];
      const dx = player.x - z.x, dy = player.y - z.y;
      const len = Math.hypot(dx,dy) || 1;
      z.wobble += 0.15;
      z.limbPhase += 0.15;
      z.angle = Math.atan2(dy,dx);
      z.x += (dx/len)*z.speed + Math.sin(z.wobble)*0.3;
      z.y += (dy/len)*z.speed + Math.cos(z.wobble)*0.3;

      // collision with player
      if (len < player.size*0.7+z.size*0.7){
        zombies.splice(i,1);
        lives -= 1;
        hitFlash = 1;
        spawnExplosion(player.x, player.y, '#ff6b6b');
        updateHUD();
        if (lives <= 0){
          endGame();
          return;
        }
        continue;
      }
    }

    // bullet-zombie collisions
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      for (let j=zombies.length-1;j>=0;j--){
        const z = zombies[j];
        const d = Math.hypot(b.x-z.x, b.y-z.y);
        if (d < z.size*0.7+b.size){
          const hitAngle = Math.atan2(b.dy, b.dx);
          spawnBlood(z.x, z.y, hitAngle);
          spawnZombieDeath(z.x, z.y);
          zombies.splice(j,1);
          bullets.splice(i,1);
          score += 10;
          if (score > highScore){ highScore = score; saveHighScore(); }
          updateHUD();
          break;
        }
      }
    }

    // particles (physics: shell & gib use gravity+rotation, others float & fade)
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      if (p.kind === 'shell' || p.kind === 'gib'){
        if (!p.grounded){
          p.x += p.dx; p.y += p.dy;
          p.dx *= 0.9; p.dy *= 0.9;
          p.rot += p.rotSpeed;
          if (Math.hypot(p.dx,p.dy) < 0.15) p.grounded = true;
        }
      } else {
        p.x += p.dx; p.y += p.dy;
        p.dx *= 0.94; p.dy *= 0.94;
      }
      p.life -= 1;
      if (p.life<=0) particles.splice(i,1);
    }

    // ambient dust motes drifting through the arena (pure atmosphere, no gameplay effect)
    for (const m of ambientMotes){
      m.x += m.vx + Math.sin(m.phase)*0.05;
      m.y += m.vy;
      m.phase += 0.02;
      if (m.y < -10) { m.y = viewH+10; m.x = Math.random()*viewW; }
      if (m.x < -10) m.x = viewW+10;
      if (m.x > viewW+10) m.x = -10;
    }

    if (hitFlash > 0) hitFlash -= 0.04;

    // spawning
    spawnTimer++;
    if (spawnTimer >= spawnInterval){
      spawnTimer = 0;
      spawnZombie();
    }
    difficultyTimer++;
    if (difficultyTimer % 300 === 0 && spawnInterval > 25){
      spawnInterval -= 5;
    }
  }

  function drawPlayer(p){
    // ground shadow — decoupled from facing rotation, sells elevation/depth
    ctx.save();
    const shY = p.y + p.size*0.55;
    const shGrad = ctx.createRadialGradient(p.x, shY, 1, p.x, shY, p.size*1.15);
    shGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
    shGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shGrad;
    ctx.beginPath();
    ctx.ellipse(p.x, shY, p.size*1.15, p.size*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    const s = p.size/26; // skala dasar
    const walk = p.moving ? Math.sin(p.walkCycle) : 0;
    const walk2 = p.moving ? Math.sin(p.walkCycle + Math.PI) : 0;

    ctx.shadowColor = '#3aa0ff';
    ctx.shadowBlur = 20;

    // legs (alternating swing while walking), shaded top-to-bottom
    const legGrad = ctx.createLinearGradient(0,-2*s,0,11*s);
    legGrad.addColorStop(0,'#2c4570');
    legGrad.addColorStop(1,'#0c1320');
    ctx.fillStyle = legGrad;
    ctx.fillRect(-6*s, -2*s + walk*5*s, 5*s, 13*s);
    ctx.fillRect(1*s, -2*s + walk2*5*s, 5*s, 13*s);

    // torso — radial highlight gives it a sculpted, volumetric read
    const torsoGrad = ctx.createRadialGradient(-3*s,-3*s,1*s, 0,0,11*s);
    torsoGrad.addColorStop(0, '#86ccff');
    torsoGrad.addColorStop(0.55, '#1d4ed8');
    torsoGrad.addColorStop(1, '#0a1c45');
    ctx.fillStyle = torsoGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, 10*s, 8*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(170,225,255,0.55)';
    ctx.lineWidth = 1.4;
    ctx.stroke();

    // arms gripping the weapon (in front of the body, facing direction = positive x axis)
    const armGrad = ctx.createLinearGradient(4*s,-7*s,9*s,7*s);
    armGrad.addColorStop(0,'#24344f');
    armGrad.addColorStop(1,'#0a0f1a');
    ctx.fillStyle = armGrad;
    ctx.fillRect(4*s, -7*s, 5*s, 4*s);
    ctx.fillRect(4*s, 3*s, 5*s, 4*s);

    // rifle — metallic gradient with a thin specular highlight
    const gunGrad = ctx.createLinearGradient(6*s,-2.5*s,6*s,2.5*s);
    gunGrad.addColorStop(0,'#5b5f66');
    gunGrad.addColorStop(0.5,'#23262b');
    gunGrad.addColorStop(1,'#13151a');
    ctx.fillStyle = gunGrad;
    ctx.fillRect(6*s, -1.5*s, 22*s, 3*s);
    ctx.fillRect(24*s, -2.5*s, 4*s, 5*s); // barrel tip
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.fillRect(7*s, -1.35*s, 18*s, 0.55*s); // specular strip
    ctx.fillStyle = '#3a3d42';
    ctx.fillRect(10*s, 1.5*s, 3*s, 5*s); // magasen

    // head — volumetric shading
    const headGrad = ctx.createRadialGradient(-2*s,-2*s,1*s, 0,0,7.5*s);
    headGrad.addColorStop(0, '#ffdcb3');
    headGrad.addColorStop(1, '#c2875a');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.arc(0, 0 - 0, 7*s, 0, Math.PI*2); // centered, slightly overlapping the body for top-down view
    ctx.fill();
    // survivor helmet/cap
    const helmGrad = ctx.createLinearGradient(0,-7*s,0,3*s);
    helmGrad.addColorStop(0, '#2f6bb0');
    helmGrad.addColorStop(1, '#071226');
    ctx.fillStyle = helmGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 7.4*s, Math.PI*0.65, Math.PI*1.85);
    ctx.lineTo(0,0);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawZombie(z){
    // ground shadow
    ctx.save();
    const shY = z.y + z.size*0.5;
    const shGrad = ctx.createRadialGradient(z.x, shY, 1, z.x, shY, z.size*1.1);
    shGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
    shGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shGrad;
    ctx.beginPath();
    ctx.ellipse(z.x, shY, z.size*1.1, z.size*0.45, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(z.x, z.y);
    ctx.rotate(z.angle);

    const s = z.size/24;
    const sway = Math.sin(z.wobble) * 0.15;
    const armSwing = Math.sin(z.limbPhase) * 4*s;

    ctx.shadowColor = '#39ff6e';
    ctx.shadowBlur = 18;

    // arms reaching forward (facing direction = positive x axis), swaying
    const armGrad = ctx.createLinearGradient(-2*s,-8*s, 11*s, 8*s);
    armGrad.addColorStop(0, '#3f8746');
    armGrad.addColorStop(1, '#143018');
    ctx.strokeStyle = armGrad;
    ctx.lineWidth = 3.2*s;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-2*s, -6*s);
    ctx.lineTo(11*s, -8*s + armSwing*0.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-2*s, 6*s);
    ctx.lineTo(11*s, 8*s - armSwing*0.6);
    ctx.stroke();

    // damaged body (uneven shape, mottled coloring), volumetric shading
    ctx.rotate(sway);
    const bodyGrad = ctx.createRadialGradient(-3*s,-4*s,1*s, 0,0,10*s);
    bodyGrad.addColorStop(0, '#7fe28e');
    bodyGrad.addColorStop(0.55, '#2f7d3f');
    bodyGrad.addColorStop(1, '#0c2310');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-9*s, -7*s);
    ctx.lineTo(6*s, -8*s);
    ctx.lineTo(9*s, -2*s);
    ctx.lineTo(7*s, 7*s);
    ctx.lineTo(-7*s, 8*s);
    ctx.lineTo(-9*s, 2*s);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(10,30,10,0.55)';
    ctx.beginPath();
    ctx.arc(-2*s + Math.sin(z.bodySeed)*2, 3*s, 3*s, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#14391c';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // head with glowing red eyes, volumetric shading
    const headGrad = ctx.createRadialGradient(0,-2*s,1*s, 2*s,0,7*s);
    headGrad.addColorStop(0, '#66b772');
    headGrad.addColorStop(1, '#1c401f');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.arc(2*s, 0, 6.5*s, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowColor = '#ff2b2b';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(5*s, -2.2*s, 1.4*s, 0, Math.PI*2);
    ctx.arc(5*s, 2.2*s, 1.4*s, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  let floorDebris = null;
  function ensureFloorDebris(){
    if (floorDebris && floorDebris._w === viewW && floorDebris._h === viewH) return;
    floorDebris = { _w: viewW, _h: viewH, items: [] };
    const count = Math.max(18, Math.floor((viewW*viewH)/42000));
    for (let i=0;i<count;i++){
      floorDebris.items.push({
        x: Math.random()*viewW,
        y: Math.random()*viewH,
        r: Math.random()*16+6,
        type: Math.random()<0.5 ? 'crack' : 'stain',
        rot: Math.random()*Math.PI*2,
        a: Math.random()*0.35+0.15
      });
    }
  }

  function drawGrid(){
    const gap = 64;
    ctx.save();

    // base floor
    ctx.fillStyle = '#0a0d10';
    ctx.fillRect(0,0,viewW,viewH);

    // checkerboard tiles for grounded, dimensional floor read
    const cols = Math.ceil(viewW/gap), rows = Math.ceil(viewH/gap);
    for (let row=0; row<rows; row++){
      for (let col=0; col<cols; col++){
        const dark = (row+col) % 2 === 0;
        ctx.fillStyle = dark ? 'rgba(16,21,19,0.6)' : 'rgba(21,28,25,0.42)';
        ctx.fillRect(col*gap, row*gap, gap, gap);
      }
    }

    // fine grid lines on top of tiles
    ctx.strokeStyle = 'rgba(90,140,100,0.07)';
    ctx.lineWidth = 1;
    for (let x=0;x<viewW;x+=gap){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,viewH); ctx.stroke(); }
    for (let y=0;y<viewH;y+=gap){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(viewW,y); ctx.stroke(); }

    // static cracks / stains for ground texture
    ensureFloorDebris();
    for (const d of floorDebris.items){
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      ctx.globalAlpha = d.a;
      if (d.type === 'crack'){
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-d.r,0); ctx.lineTo(-d.r*0.3,d.r*0.22); ctx.lineTo(d.r*0.2,-d.r*0.15); ctx.lineTo(d.r,0);
        ctx.stroke();
      } else if (d.type === 'blood'){
        const bg = ctx.createRadialGradient(0,0,0, 0,0,d.r);
        bg.addColorStop(0, 'rgba(120,10,20,0.9)');
        bg.addColorStop(0.7, 'rgba(70,5,12,0.55)');
        bg.addColorStop(1, 'rgba(70,5,12,0)');
        ctx.fillStyle = bg;
        ctx.beginPath();
        ctx.ellipse(0,0,d.r,d.r*0.62,0,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(90,6,14,0.6)';
        for (let i=0;i<4;i++){
          const a = i*1.7;
          ctx.beginPath();
          ctx.ellipse(Math.cos(a)*d.r*0.6, Math.sin(a)*d.r*0.4, d.r*0.22, d.r*0.14, a, 0, Math.PI*2);
          ctx.fill();
        }
      } else {
        ctx.fillStyle = 'rgba(45,15,15,0.4)';
        ctx.beginPath();
        ctx.ellipse(0,0,d.r,d.r*0.5,0,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.restore();

    // dynamic light pool following the player (primary depth/lighting cue)
    if (player){
      ctx.save();
      const light = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 360);
      light.addColorStop(0, 'rgba(130,195,255,0.16)');
      light.addColorStop(0.5, 'rgba(70,130,170,0.06)');
      light.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = light;
      ctx.fillRect(0,0,viewW,viewH);
      ctx.restore();
    }
  }

  function drawAmbientMotes(){
    ctx.save();
    for (const m of ambientMotes){
      const flicker = 0.7 + 0.3*Math.sin(m.phase*2);
      ctx.globalAlpha = m.alpha * flicker;
      ctx.shadowColor = '#7fd6ff';
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#bfe9ff';
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawVignette(){
    ctx.save();
    const r0 = Math.min(viewW,viewH)*0.32;
    const r1 = Math.max(viewW,viewH)*0.78;
    const vign = ctx.createRadialGradient(viewW/2, viewH/2, r0, viewW/2, viewH/2, r1);
    vign.addColorStop(0, 'rgba(0,0,0,0)');
    vign.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vign;
    ctx.fillRect(0,0,viewW,viewH);
    ctx.restore();
  }

  function drawParticle(p){
    const alpha = Math.max(p.life / p.maxLife, 0);
    ctx.save();
    ctx.globalAlpha = alpha;

    if (p.kind === 'muzzle'){
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.shadowColor = '#fff6c8';
      ctx.shadowBlur = 26;
      const g = ctx.createRadialGradient(0,0,0, 0,0,p.size*1.4);
      g.addColorStop(0, 'rgba(255,255,240,' + alpha + ')');
      g.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(p.size, -p.size*0.35);
      ctx.lineTo(p.size*1.4, 0);
      ctx.lineTo(p.size, p.size*0.35);
      ctx.closePath();
      ctx.fill();
    } else if (p.kind === 'shell'){
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      const g = ctx.createLinearGradient(-p.size*0.6,0,p.size*0.6,0);
      g.addColorStop(0, '#8a6a1c');
      g.addColorStop(0.5, '#f0d060');
      g.addColorStop(1, '#8a6a1c');
      ctx.fillStyle = g;
      ctx.fillRect(-p.size*0.6, -p.size*0.3, p.size*1.2, p.size*0.6);
    } else if (p.kind === 'blood'){
      ctx.shadowColor = 'rgba(120,0,20,0.5)';
      ctx.shadowBlur = 4;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    } else if (p.kind === 'gib'){
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.shadowColor = '#39ff6e';
      ctx.shadowBlur = 8;
      const g = ctx.createLinearGradient(-p.size/2,-p.size/2,p.size/2,p.size/2);
      g.addColorStop(0, p.color);
      g.addColorStop(1, 'rgba(0,0,0,0.55)');
      ctx.fillStyle = g;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    } else {
      // spark / explosion: soft bloom dot
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 16;
      const g = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y,p.size*1.7);
      g.addColorStop(0, p.color);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*1.7, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  let scanOffset = 0;
  function drawScanlines(){
    ctx.save();
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#8fd6ff';
    for (let y = -8 + (scanOffset % 4); y < viewH; y += 4){
      ctx.fillRect(0, y, viewW, 1);
    }
    ctx.restore();
    scanOffset += 0.25;
  }

  function draw(){
    ctx.clearRect(0,0,viewW,viewH);
    drawGrid();
    drawAmbientMotes();

    // shell casings & gibs below the characters (ground layer)
    for (const p of particles){
      if (p.kind === 'shell' || p.kind === 'gib' || p.kind === 'blood') drawParticle(p);
    }

    // zombies
    for (const z of zombies){
      drawZombie(z);
    }

    // player
    drawPlayer(player);

    // bullets with a soft glowing trail for a faster, more dimensional read
    ctx.save();
    ctx.shadowColor = '#ffdd55';
    ctx.shadowBlur = 16;
    for (const b of bullets){
      const trail = ctx.createLinearGradient(b.x, b.y, b.x - b.dx*1.6, b.y - b.dy*1.6);
      trail.addColorStop(0, 'rgba(255,225,120,0.9)');
      trail.addColorStop(1, 'rgba(255,225,120,0)');
      ctx.strokeStyle = trail;
      ctx.lineWidth = b.size*1.4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(b.x - b.dx*1.6, b.y - b.dy*1.6);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.fillStyle = '#fff6cf';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    // top-layer effects: muzzle flash, spark, explosion
    for (const p of particles){
      if (p.kind === 'muzzle' || p.kind === 'spark' || p.kind === 'explosion') drawParticle(p);
    }

    // cinematic vignette — applied last so it reads as a camera/lens effect over everything
    drawVignette();
    drawScanlines();

    if (hitFlash > 0){
      ctx.save();
      ctx.fillStyle = 'rgba(255,30,30,' + (hitFlash*0.35) + ')';
      ctx.fillRect(0,0,viewW,viewH);
      ctx.restore();
    }
  }

  let rafId;
  let isPaused = false;
  document.addEventListener('visibilitychange', ()=>{
    if (document.hidden) isPaused = true;
    else isPaused = false;
  });

  function loop(){
    if (!isPaused) update();
    draw();
    if (gameRunning){
      rafId = requestAnimationFrame(loop);
    }
  }

  function endGame(){
    gameRunning = false;
    saveHighScore();
    finalScoreEl.textContent = 'Score: ' + score;
    finalHighEl.textContent = 'Best: ' + highScore;
    updateHUD();
    gameOverOverlay.classList.remove('hidden');
    cancelAnimationFrame(rafId);
  }

  window.startGame = function(){
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    initState();
    cancelAnimationFrame(rafId);
    loop();
  };

  window.addEventListener('beforeunload', saveHighScore);

  updateHUD();
})();
</script>
</body>
</html>
